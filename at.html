<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        .btn {
            padding: 12px 25px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 200px;
        }
        .apply {
            background-color: #28a745;
            color: white;
        }
        .track {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>

    <h2>You can apply here or track your status.</h2>

    <br>
    <a href=""><button class="btn apply" onclick="applyNow()">Apply</button></a>
    <br><br>
    <a href=""><button class="btn track" onclick="trackStatus()">Track Status</button></a>

</body>
</html>
