<!DOCTYPE html>
<html>
<head>
  <title>ID Card</title>
  <style>
    body {
      font-family: Arial;
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }

    #details, #apply {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    #details p {
      margin: 5px 0;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 10px;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body>

<h2>Apply for ID Card (SMART)</h2>

<!-- Employee ID -->
<input type="text" id="empId" placeholder="Enter Employee ID">
<button onclick="getEmp()">Submit</button>

<!-- Employee Details -->
<div id="details" style="display:none;">
  <div id="info"></div>
  <button onclick="showApply()">Apply</button>
</div>

<!-- Apply Section -->
<div id="apply" style="display:none;">
  <p>
    <b>Payment Link:</b><br>
    <a href="upi://pay?pa=sk6995554@okhdfcbank&pn=SarveshKumar&am=100.00&cu=INR&tn=Smart%20Card" target="_blank">Click Me</a>
  </p>

  <label>Payment Done?</label>
  <select id="payment" name="payment" required>
    <option value="Yes">Yes</option>
    <option value="No" selected>No</option>
  </select>
  
  <br><br>
  
  <label>FOs / AOs / AMs / Mgr Name</label>
  <select id="foname" name="foname" required>
                <option value="" selected>Select Name</option>
                <option value="Mr. Babaram Surve">Mr. Babaram Surve</option>
                <option value="Mr. Babaram Surve">Mr. Kaushik Acharya</option>
                <option value="Mr. Balaji Ghodake">Mr. Balaji Ghodake</option>
                <option value="Mr. Manoj Palande">Mr. Manoj Palande</option>
                <option value="Mr. Shivling Khabile">Mr. Shivling Khabile</option>
                <option value="Mr. Suresh Math">Mr. Suresh Math</option>
                <option value="Mr. Atul Thombre">Mr. Atul Thombre</option>
                <option value="Mr. Ramchandra Painkara">Mr. Ramchandra Painkara</option>
  </select>

  <label>Upload Payment Screenshot</label>
  <input type="file" id="file" required>

  <button onclick="submitForm()">Submit Application</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwXVyWybZcQEoc-hJvb1JdFsOM8xw0s7BTKn1joUtY7I2hnT9gDUBB33guYZO9P6wlbmQ/exec";

let emp = {};

// ✅ Fetch Employee
function getEmp() {
  const empId = document.getElementById("empId").value;

  if (!empId) {
    alert("Enter Employee ID");
    return;
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "getEmployee",
      empId: empId
    })
  })
  .then(res => res.json())
  .then(res => {
    console.log(res);

    if (res.status === "success") {
      emp = res.data;

      document.getElementById("details").style.display = "block";

      // ✅ Vertical Display
      document.getElementById("info").innerHTML = `
        <p><b>Employee ID:</b> ${emp.empId}</p>
        <p><b>Full Name:</b> ${emp.name}</p>
        <p><b>DOB:</b> ${emp.dob}</p>
        <p><b>Designation:</b> ${emp.designation}</p>
        <p><b>Father Name:</b> ${emp.father}</p>
        <p><b>UAN:</b> ${emp.uan}</p>
        <p><b>ESIC:</b> ${emp.esic}</p>
      `;

    } else {
      alert(res.message);
    }
  })
  .catch(err => {
    alert("Error: " + err);
  });
}

// ✅ Show Apply Section
function showApply() {
  document.getElementById("apply").style.display = "block";
}

// ✅ Submit Form
function submitForm() {
  const file = document.getElementById("file").files[0];

  if (!file) {
    alert("Please upload payment screenshot");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const base64 = e.target.result.split(",")[1];

    fetch(API, {
      method: "POST",
      body: JSON.stringify({
        action: "submitApplication",
        empId: emp.empId,
        name: emp.name,
        email: emp.email,
        paymentStatus: document.getElementById("payment").value,
        fieldstaff: document.getElementById("foname").value,
        fileData: base64,
        mimeType: file.type,
        fileName: file.name
      })
    })
    .then(res => res.json())
    .then(res => {
      if (res.status === "success") {
        alert("Application Submitted Successfully ✅");
        location.reload();
      } else {
        alert("Submission Failed ❌");
      }
    })
    .catch(err => {
      alert("Error: " + err);
    });
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
